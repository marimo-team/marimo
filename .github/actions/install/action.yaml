name: Install Repo
description: Checkout repo and install the ts toolchain and dependencies

runs:
  using: 'composite'

  steps:
    - name: ⎔ Setup pnpm
      uses: pnpm/action-setup@v4

    - name: ⎔ Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: pnpm
        cache-dependency-path: '**/pnpm-lock.yaml'

    - name: 📥 Install dependencies
      shell: bash
      run: pnpm install --ignore-scripts --frozen-lockfile
