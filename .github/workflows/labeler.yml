name: 🏷️ Pull Request Labeler

# Auto-label pull requests based on config in .github/labeler.yml

on:
  pull_request_target:
    types: [labeled, unlabeled, opened, reopened, edited, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Apply fallback PR type label
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const requiredLabels = new Set([
              'enhancement',
              'bug',
              'documentation',
              'internal',
              'preview',
              'dependencies',
              'other',
            ]);
            const titleLabelRules = [
              {
                label: 'bug',
                patterns: [
                  /^fix(?:\([^)]*\))?!?:/i,
                  /^bug(?:\([^)]*\))?!?:/i,
                ],
              },
              {
                label: 'enhancement',
                patterns: [
                  /^feat(?:\([^)]*\))?!?:/i,
                  /^enhancement(?:\([^)]*\))?!?:/i,
                ],
              },
              {
                label: 'documentation',
                patterns: [/^docs?(?:\([^)]*\))?!?:/i],
              },
              {
                label: 'internal',
                patterns: [
                  /^internal(?:\([^)]*\))?!?:/i,
                  /^ci(?:\([^)]*\))?!?:/i,
                  /^chore(?:\([^)]*\))?!?:/i,
                ],
              },
              {
                label: 'preview',
                patterns: [
                  /^preview(?:\([^)]*\))?!?:/i,
                  /^experimental(?:\([^)]*\))?!?:/i,
                ],
              },
            ];

            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;

            // Fetch the live PR state so we see labels added earlier in this
            // job instead of relying on a stale event payload.
            const { data: pullRequest } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const existingRequiredLabels = pullRequest.labels
              .map((label) => label.name)
              .filter((label) => requiredLabels.has(label));

            if (existingRequiredLabels.length > 0) {
              console.log(
                `Skipping fallback label because PR #${prNumber} already has ${existingRequiredLabels.join(', ')}.`
              );
              return;
            }

            const title = pullRequest.title.trim();
            const matchedRule = titleLabelRules.find(({ patterns }) =>
              patterns.some((pattern) => pattern.test(title))
            );
            const labelToAdd = matchedRule?.label ?? 'other';

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels: [labelToAdd],
            });

            console.log(
              `Applied fallback label '${labelToAdd}' to PR #${prNumber} from title '${title}'.`
            );
