name: Publish marimo-base release

# release a new version of marimo-base on tag push
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_EXCLUDE_NEWER: "7 days"

jobs:
  publish_release:
    name: 📤 Publish release
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        shell: bash

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🔐 Fetch Doppler secrets
        uses: dopplerhq/secrets-fetch-action@cd2efbf9a404504316435873eff298b82f7e0562 # v1.3.0
        id: secrets
        with:
          auth-method: oidc
          doppler-identity-id: ${{ vars.DOPPLER_IDENTITY_ID }}
          doppler-project: marimo-oss
          doppler-config: ci_deploy

      - name: 📦 Build frontend
        uses: ./.github/actions/build-frontend
        with:
          turbo-token: ${{ steps.secrets.outputs.TURBO_TOKEN }}
          codecov-token: ${{ steps.secrets.outputs.CODECOV_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Adapt pyproject.toml to build marimo-base
        run: uv run ./scripts/modify_pyproject_for_marimo_base.py

      - name: 📦 Build marimo-base
        run: uv build

      - name: 📦 Validate wheel under 2mb
        run: ./scripts/validate_base_wheel_size.sh

      - name: 📤 Upload to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          skip-existing: true
          verbose: true
          attestations: false

      - name: 📤 Upload to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          skip-existing: true
          verbose: true
          attestations: false
          repository-url: https://test.pypi.org/legacy/

      - name: 📢 Notify release result
        if: always()
        continue-on-error: true
        uses: marimo-team/internal-gh-actions/release-notification@ba06d4db1f3c5c9b86983ce409e57196f8376777 # main
        with:
          status: ${{ job.status }}
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL_RELEASES }}
          artifact-url: "https://pypi.org/project/marimo-base/"
