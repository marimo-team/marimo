        traceback:
          anyOf:
          - type: string
          - type: 'null'
          default: null
        type:
          enum:
          - exception
      required:
      - type
      - msg
      - exception_type
      - raising_cell
      title: MarimoExceptionRaisedError
      type: object
    MarimoInternalError:
      description: 'An internal error that should be hidden from the user.

        The error is logged to the console and then a new error is broadcasted

        such that the data is hidden.


        They can be linked back to the original error by the error_id.'
      properties:
        error_id:
          type: string
        msg:
          default: ''
          type: string
        type:
          enum:
          - internal
      required:
      - type
      - error_id
      title: MarimoInternalError
      type: object
    MarimoInterruptionError:
      properties:
        type:
          enum:
          - interruption
      required:
      - type
      title: MarimoInterruptionError
      type: object
    MarimoSQLError:
      description: SQL-specific error with enhanced metadata for debugging.
      properties:
        hint:
          anyOf:
          - type: string
          - type: 'null'
          default: null
        msg:
          type: string
        node_col_offset:
          default: 0
          type: integer
        node_lineno:
          default: 0
          type: integer
        sql_col:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
        sql_line:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
        sql_statement:
          type: string
        type:
          enum:
          - sql-error
      required:
      - type
      - msg
      - sql_statement
      title: MarimoSQLError
      type: object
    MarimoStrictExecutionError:
      properties:
        blamed_cell:
          anyOf:
          - type: string
          - type: 'null'
        msg:
          type: string
        ref:
          type: string
        type:
          enum:
          - strict-exception
      required:
      - type
      - msg
      - ref
      - blamed_cell
      title: MarimoStrictExecutionError
      type: object
    MarimoSyntaxError:
      properties:
        lineno:
          anyOf:
          - type: integer
          - type: 'null'
          default: null
        msg:
          type: string
        type:
          enum:
          - syntax
      required:
      - type
      - msg
      title: MarimoSyntaxError
      type: object
    MissingPackageAlertNotification:
      description: "Alert for missing packages with install option.\n\n    Attributes:\n\
        \        packages: Missing package names.\n        isolated: Whether auto-install\
        \ is possible in this environment.\n        source: Which Python environment\
        \ to install into. \"kernel\" (default)\n                installs in the kernel's\
        \ venv; \"server\" installs in the\n                server's own Python env\
        \ (e.g. for formatter tools like ruff)."
      properties:
        isolated:
          type: boolean
        op:
          enum:
          - missing-package-alert
        packages:
          items:
            type: string
          type: array
        source:
          default: kernel
          enum:
          - kernel
          - server
      required:
      - op
      - packages
      - isolated
      title: MissingPackageAlertNotification
      type: object
    MultipleDefinitionError:
      properties:
        cells:
          items:
            type: string
          type: array
        name:
          type: string
        type:
          enum:
          - multiple-defs
      required:
      - type
      - name
      - cells
      title: MultipleDefinitionError
      type: object
    QueryParamsAppendNotification:
      description: "Appends value to URL query parameter.\n\n    Attributes:\n   \
        \     key: Query parameter key.\n        value: Value to append."
      properties:
        key:
          type: string
        op:
          enum:
          - query-params-append
        value:
          type: string
      required:
      - op
      - key
      - value
      title: QueryParamsAppendNotification
      type: object
    QueryParamsClearNotification:
      description: Clears all URL query parameters.
      properties:
        op:
          enum:
          - query-params-clear
      required:
      - op
      title: QueryParamsClearNotification
      type: object
    QueryParamsDeleteNotification:
      description: "Deletes URL query parameter values.\n\n    Attributes:\n     \
        \   key: Query parameter key.\n        value: Specific value to delete. If\
        \ None, deletes all values for key."
      properties:
        key:
          type: string
        op:
          enum:
          - query-params-delete
        value:
          anyOf:
          - type: string
          - type: 'null'
      required:
      - op
      - key
      - value
      title: QueryParamsDeleteNotification
      type: object
    QueryParamsSetNotification:
      description: "Sets URL query parameter, replacing existing values.\n\n    Attributes:\n\
        \        key: Query parameter key.\n        value: Value(s) to set."
      properties:
        key:
          type: string
        op:
          enum:
          - query-params-set
        value:
          anyOf:
          - type: string
          - items:
              type: string
            type: array
      required:
      - op
      - key
      - value
      title: QueryParamsSetNotification
      type: object
    ReconnectedNotification:
      description: WebSocket reconnection confirmed.
      properties:
        op:
          enum:
          - reconnected
      required:
      - op
      title: ReconnectedNotification
      type: object
    ReloadNotification:
      description: Instructs frontend to reload the page.
      properties:
        op:
          enum:
          - reload
      required:
      - op
      title: ReloadNotification
      type: object
    RemoveUIElementsNotification:
      description: "Removes UI elements associated with a cell.\n\n    Sent when cell\
        \ is re-executed or deleted.\n\n    Attributes:\n        cell_id: Cell whose\
        \ UI elements should be removed."
      properties:
        cell_id:
          type: string
        op:
          enum:
          - remove-ui-elements
      required:
      - op
      - cell_id
      title: RemoveUIElementsNotification
      type: object
    SQLDatabaseMetadata:
      description: "SQL database metadata.\n\n    Attributes:\n        connection:\
        \ Connection identifier.\n        database: Database name."
      properties:
        connection:
          type: string
        database:
          type: string
      required:
      - connection
      - database
      title: SQLDatabaseMetadata
      type: object
    SQLMetadata:
      description: "SQL database and schema metadata.\n\n    Attributes:\n       \
        \ connection: Connection identifier.\n        database: Database name.\n \
        \       schema: Schema name."
      properties:
        connection:
          type: string
        database:
          type: string
        schema:
          type: string
        type:
          enum:
          - sql-metadata
      required:
      - type
      - connection
      - database
      - schema
      title: SQLMetadata
      type: object
    SQLSchemaListPreviewNotification:
      description: "List of SQL schemas in a database.\n\n    Attributes:\n      \
        \  request_id: Request ID this responds to.\n        metadata: Database and\
        \ schema metadata.\n        schemas: Schemas in database.\n        error:\
        \ Error message if failed."
      properties:
        error:
          anyOf:
          - type: string
          - type: 'null'
          default: null
        metadata:
          $ref: '#/components/schemas/SQLDatabaseMetadata'
        op:
          enum:
          - sql-schema-list-preview
        request_id:
          type: string
        schemas:
          default: []
          items:
            $ref: '#/components/schemas/Schema'
          type: array
      required:
      - op
      - request_id
      - metadata
      title: SQLSchemaListPreviewNotification
      type: object
    SQLTableListPreviewNotification:
      description: "List of SQL tables in a schema.\n\n    Attributes:\n        request_id:\
        \ Request ID this responds to.\n        metadata: Database and schema metadata.\n\
        \        tables: Tables in schema.\n        error: Error message if failed."
      properties:
        error:
          anyOf:
          - type: string
          - type: 'null'
          default: null
        metadata:
          $ref: '#/components/schemas/SQLMetadata'
        op:
          enum:
          - sql-table-list-preview
        request_id:
          type: string
        tables:
          default: []
          items:
            $ref: '#/components/schemas/DataTable'
          type: array
      required:
      - op
      - request_id
      - metadata
      title: SQLTableListPreviewNotification
      type: object
    SQLTablePreviewNotification:
      description: "SQL table preview.\n\n    Attributes:\n        request_id: Request\
        \ ID this responds to.\n        metadata: Database and schema metadata.\n\
        \        table: Table data (None if error).\n        error: Error message\
        \ if failed."
      properties:
        error:
          anyOf:
          - type: string
          - type: 'null'
          default: null
        metadata:
          $ref: '#/components/schemas/SQLMetadata'
        op:
          enum:
          - sql-table-preview
        request_id:
          type: string
        table:
          anyOf:
          - type: 'null'
          - $ref: '#/components/schemas/DataTable'
      required:
      - op
      - request_id
      - metadata
      - table
      title: SQLTablePreviewNotification
      type: object
    Schema:
      properties:
        name:
          type: string
        tables:
          items:
            $ref: '#/components/schemas/DataTable'
          type: array
      required:
      - name
      - tables
      title: Schema
      type: object
    SecretKeysResultNotification:
      description: "Available secret keys from secret providers.\n\n    Attributes:\n\
        \        request_id: Request ID this responds to.\n        secrets: Secret\
        \ keys with provider info."
      properties:
        op:
          enum:
          - secret-keys-result
        request_id:
          type: string
        secrets:
          items:
            $ref: '#/components/schemas/SecretKeysWithProvider'
          type: array
      required:
      - op
      - request_id
      - secrets
      title: SecretKeysResultNotification
      type: object
    SecretKeysWithProvider:
      properties:
        keys:
          items:
            type: string
          type: array
        name:
          type: string
        provider:
          enum:
          - dotenv
          - env
      required:
      - provider
      - name
      - keys
      title: SecretKeysWithProvider
      type: object
    SetupRootError:
      properties:
        edges_with_vars:
          items:
            items: false
            maxItems: 3
            minItems: 3
            prefixItems:
            - type: string
            - items:
                type: string
              type: array
            - type: string
            type: array
          type: array
        type:
          enum:
          - setup-refs
      required:
      - type
      - edges_with_vars
      title: SetupRootError
      type: object
    SqlCatalogCheckResult:
      description: Result of running validation against the database.
      properties:
        error_message:
          anyOf:
          - type: string
          - type: 'null'
        success:
          type: boolean
      required:
      - success
      - error_message
      title: SqlCatalogCheckResult
      type: object
    SqlParseError:
      description: "Represents a single SQL parse error.\n\nAttributes:\n    message\
        \ (str): Description of the error.\n    line (int): Line number where the\
        \ error occurred (1-based).\n    column (int): Column number where the error\
        \ occurred (1-based).\n    severity (Literal[\"error\", \"warning\"]): Severity\
        \ of the error."
      properties:
        column:
          type: integer
        line:
          type: integer
        message:
          type: string
        severity:
          enum:
          - error
          - warning
      required:
      - message
      - line
      - column
      - severity
      title: SqlParseError
      type: object
    SqlParseResult:
      description: "Result of parsing an SQL query.\n\nAttributes:\n    success (bool):\
        \ True if parsing succeeded without errors.\n    errors (list[SqlParseError]):\
        \ List of parse errors (empty if success is True)."
      properties:
        errors:
          items:
            $ref: '#/components/schemas/SqlParseError'
          type: array
        success:
          type: boolean
      required:
      - success
      - errors
      title: SqlParseResult
      type: object
    StartupLogsNotification:
      description: "Streaming kernel startup logs.\n\n    Attributes:\n        content:\
        \ Log content to display.\n        status: Stream status (start/append/done)."
      properties:
        content:
          type: string
        op:
          enum:
          - startup-logs
        status:
          enum:
          - append
          - done
          - start
      required:
      - op
      - content
      - status
      title: StartupLogsNotification
      type: object
    UIElementMessageNotification:
      description: "Sends a message to a UI element/widget.\n\n    Attributes:\n \
        \       ui_element: UI element identifier.\n        message: Message payload\
        \ as dictionary.\n        buffers: Optional binary buffers for large data."
      properties:
        buffers:
          anyOf:
          - items:
              contentEncoding: base64
              type: string
            type: array
          - type: 'null'
          default: null
        message:
          type: object
        op:
          enum:
          - send-ui-element-message
        ui_element:
          type: string
      required:
      - op
      - ui_element
      - message
      title: UIElementMessageNotification
      type: object
    UnknownError:
      properties:
        error_type:
          anyOf:
          - type: string
          - type: 'null'
          default: null
        msg:
          type: string
        type:
          enum:
          - unknown
      required:
      - type
      - msg
      title: UnknownError
      type: object
    ValidateSQLResultNotification:
      description: "SQL query validation result.\n\n    Attributes:\n        request_id:\
        \ Request ID this responds to.\n        parse_result: SQL parsing result.\n\
        \        validate_result: Catalog validation result.\n        error: Error\
        \ message if failed."
      properties:
        error:
          anyOf:
          - type: string
          - type: 'null'
          default: null
        op:
          enum:
          - validate-sql-result
        parse_result:
          anyOf:
          - type: 'null'
          - $ref: '#/components/schemas/SqlParseResult'
          default: null
        request_id:
          type: string
        validate_result:
          anyOf:
          - type: 'null'
          - $ref: '#/components/schemas/SqlCatalogCheckResult'
          default: null
      required:
      - op
      - request_id
      title: ValidateSQLResultNotification
      type: object
    VariableDeclarationNotification:
      description: "Variable declaration and usage for dataflow graph.\n\n    Attributes:\n\
        \        name: Variable name.\n        declared_by: Cell IDs that define this\
        \ variable.\n        used_by: Cell IDs that use this variable."
      properties:
        declared_by:
          items:
            type: string
          type: array
        name:
          type: string
        used_by:
          items:
            type: string
          type: array
      required:
      - name
      - declared_by
      - used_by
      title: VariableDeclarationNotification
      type: object
    VariableValue:
      description: "Variable value and type for variables panel.\n\n    Attributes:\n\
        \        name: Variable name.\n        value: String representation of value.\n\
        \        datatype: Data type as string."
      properties:
        datatype:
          anyOf:
          - type: string
          - type: 'null'
        name:
          type: string
        value:
          anyOf:
          - type: string
          - type: 'null'
      required:
      - name
      - value
      - datatype
      title: VariableValue
      type: object
    VariableValuesNotification:
      description: "Current variable values.\n\n    Attributes:\n        variables:\
        \ Variables with current values and types."
      properties:
        op:
          enum:
          - variable-values
        variables:
          items:
            $ref: '#/components/schemas/VariableValue'
          type: array
      required:
      - op
      - variables
      title: VariableValuesNotification
      type: object
    VariablesNotification:
      description: "Variable dataflow graph.\n\n    Attributes:\n        variables:\
        \ Variable declarations and usage."
      properties:
        op:
          enum:
          - variables
        variables:
          items:
            $ref: '#/components/schemas/VariableDeclarationNotification'
          type: array
      required:
      - op
      - variables
      title: VariablesNotification
      type: object
    _AppConfig:
      description: "Program-specific configuration.\n\n    Configuration for frontends\
        \ or runtimes that is specific to\n    a single marimo program."
      properties:
        app_title:
          anyOf:
          - type: string
          - type: 'null'
          default: null
        auto_download:
          items:
            enum:
            - html
            - ipynb
            - markdown
          type: array
        css_file:
          anyOf:
          - type: string
          - type: 'null'
          default: null
        html_head_file:
          anyOf:
          - type: string
          - type: 'null'
          default: null
        layout_file:
          anyOf:
          - type: string
          - type: 'null'
          default: null
        sql_output:
          default: auto
          enum:
          - auto
          - lazy-polars
          - native
          - pandas
          - polars
        width:
          default: compact
          enum:
          - columns
          - compact
          - full
          - medium
          - normal
      required: []
      title: _AppConfig
      type: object
info:
  title: marimo
openapi: 3.0.0
