verifyDepsBeforeRun: install
packages:
  - frontend
  - packages/*
minimumReleaseAge: 20160
minimumReleaseAgeExclude:
  - "@marimo-team/*"
  - yaml@2.8.3
  - path-to-regexp@8.4.0
  - oxlint@1.58.0
  - "@oxlint/*"
  - lodash-es@4.18.1
  - dompurify@3.4.0
  - postcss@8.5.10
blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # Maintainer dropped provenance after 3.4.1 (registry signature unchanged).
  # Not a known takeover — likely a CI pipeline change.
  - "@textea/json-viewer@4.0.1"
  # Provenance present on 2.5.x and 3.x, dropped only in 2.6.0.
  # ^2.6.0 range can't bump to 3.x without code changes.
  - "tailwind-merge@2.6.0"
